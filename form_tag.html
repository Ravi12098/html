<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM TAG</title>
</head>
<body>
    <h1>Input Types in Forms</h1>

    <form>
        <label for="name">Your name:</label>
        <input type="text" name="name" id="name" placeholder="name" >

        <br>
        <label for="pw">Password:</label>
        <input type="password" name="password" id="pw" required >

        <br>
        <label for="Email">Email:</label>
        <input type="email" name="email" id="email" required >

        <br>
        <label for="Number">Number:</label>
        <input type="number" name="Number" id="Number" >

        <br>
        <label for="date">Date of Birth:</label>
        <input type="date" name="date" id="date">

        <br>
        <Label for="color">Pick your favourite color:</Label>
        <input type="color" name="color" id="color">

        <br>
        <label for="file">Uplod your resume:</label>
        <input type="file" name="file" id="file">

        <br>
        <label><input type="radio" name="gender" value="male">male</label>
        <label><input type="radio" name="gender" value="female">female</label>
        <label><input type="radio" name="gender" value="other">other</label>

        <br>
        <label><input type="checkbox" name="hobby" value="gameing">gameing</label>
        <label><input type="checkbox" name="hobby" value="movie">movie</label>
        <label><input type="checkbox" name="hobby" value="coding">Coding</label>
        <label><input type="checkbox" name="hobby" value="reading">reading</label>

        <br>
        <button type="submit">sing up</button>
        <button type="reset">reset</button>

    </form>

    <form>
        <fieldset>
            <legend>personal details</legend>
            <label for="Name">Name:</label>
            <input type="text" name="name" id="Name" placeholder="your name">

            <br>
            <label for="Email">Email:</label>
            <input type="email" name="Email" id="Email">
        </fieldset>

         <fieldset>
            <legend>Account details</legend>
            <label for="pw">password:</label>
            <input type="password" name="password" id="password">

            <br>
            <label for="number">Number:</label>
            <input type="number" name="Number" id="Number">

            <br>
            <label for="volume">volume</label>
            <input type="range" name="volume" id="volume" max="10" min="0" value="5" >
        </fieldset>

    </form>
    
</body>
</html>
