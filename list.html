<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST TAG</title>
</head>
<body>
    <h1>list</h1>
    <h2>unordered list</h2>
    <ul>
        <li>phone
            <ul>
                <li>whatsapp</li>
                <li>youtube</li>
            </ul>
         </li>
        <li>laptop</li>
        <li>earbuds</li>
    </ul>
    <h2>ordered list</h2>
    <ol>
        <li>step 1</li>
        <li>step 2</li>
        <li>step 3</li>
    </ol>
    <h2>description list</h2>
    <dl>
        <dt>html</dt>
        <dd>the structure of web page</dd>
        <dt>css</dt>
        <dd>the styleing of web page</dd>
        <dt>javascript</dt>
        <dd>the brain of a page</dd>
    </dl>
</body>
</html>
